<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshBite | Your Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-hero {
      position: relative;
      min-height: 35vh;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.7) 100%), url('https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
      color: white;
      margin-bottom: 3rem;
      text-align: center;
    }

    .cart-hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .cart-hero p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      max-width: 600px;
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
    }

    .cart-layout {
      display: grid;
      gap: 2rem;
      margin-bottom: 3rem;
    }

    @media (min-width: 1024px) {
      .cart-layout {
        grid-template-columns: 1fr 400px;
      }
    }

    .cart-items-section, .cart-summary {
      background: white;
      border-radius: 24px;
      padding: 2.2rem;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
    }

    .cart-items {
      display: grid;
      gap: 1.5rem;
    }

    .cart-item {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      padding: 1.5rem;
      border-radius: 16px;
      background: #f9f7f3;
      border: 1px solid rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }

    .cart-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .cart-item-image {
      width: 100px;
      height: 100px;
      border-radius: 14px;
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }

    .cart-item-details {
      flex-grow: 1;
    }

    .cart-item-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .cart-item-price {
      font-size: 1rem;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .quantity-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 2px solid var(--primary);
      background: white;
      color: var(--primary);
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quantity-btn:hover {
      background: var(--primary);
      color: white;
    }

    .quantity-btn:active {
      transform: scale(0.95);
    }

    .quantity-input {
      width: 60px;
      height: 40px;
      text-align: center;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .remove-btn {
      padding: 0.5rem 1rem;
      background: rgba(255, 107, 53, 0.1);
      color: var(--primary);
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .remove-btn:hover {
      background: var(--primary);
      color: white;
    }

    .empty-cart {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-cart h3 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text-dark);
    }

    .empty-cart p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .cart-summary h2 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: var(--text-dark);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .summary-line.total {
      padding-top: 1rem;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--text-dark);
    }

    .cart-actions {
      display: grid;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-secondary {
      padding: 1rem 1.5rem;
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .btn-primary {
      padding: 1rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:active, .btn-secondary:active {
      transform: translateY(0);
    }

    .fade-in {
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cart-items-section { animation-delay: 0.1s; }
    .cart-summary { animation-delay: 0.2s; }

    @media (max-width: 768px) {
      .cart-hero {
        min-height: 30vh;
        padding: 1.5rem;
      }

      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-items-section, .cart-summary {
        padding: 1.5rem;
      }

      .cart-item {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
      }

      .cart-item-image {
        width: 120px;
        height: 120px;
      }

      .quantity-controls {
        justify-content: center;
      }

      .sticky-checkout {
        position: fixed;
        bottom: 80px;
        left: 1rem;
        right: 1rem;
        background: white;
        padding: 1rem;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        z-index: 100;
      }

      .cart-actions {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <a href="home.html" class="brand">FreshBite</a>
      <nav class="top-nav">
        <a href="home.html">Home</a>
        <a href="Menu.html">Menu</a>
        <a href="Order.html">Order</a>
        <a href="cart.html" class="active">Cart</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="cart-indicator">
        <span class="cart-count">0</span>
        <a href="cart.html">Cart</a>
      </div>
    </header>

    <main class="app-main">
      <section class="cart-hero fade-in">
        <div>
          <h1>Your Cart</h1>
          <p>Review your order before checkout</p>
        </div>
      </section>

      <section class="cart-layout">
        <div class="cart-items-section fade-in">
          <h2>Your Items</h2>
          <div id="cart-items" class="cart-items">
            <!-- Cart items will be populated here -->
          </div>
        </div>

        <aside class="cart-summary fade-in">
          <h2>Order Summary</h2>
          <div class="summary-line">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-line">
            <span>Delivery Fee</span>
            <span>$2.50</span>
          </div>
          <div class="summary-line total">
            <span>Total</span>
            <span id="total">$2.50</span>
          </div>

          <div class="cart-actions">
            <a href="Menu.html" class="btn-secondary">Continue Shopping</a>
            <button id="checkout-btn" class="btn-primary">Proceed to Checkout</button>
          </div>
        </aside>
      </section>

      <div class="sticky-checkout" style="display: none;">
        <div class="summary-line total" style="margin: 0; padding: 0; border: none;">
          <span>Total: <strong id="mobile-total">$2.50</strong></span>
        </div>
        <button id="mobile-checkout-btn" class="btn-primary" style="width: 100%; margin-top: 1rem;">Proceed to Checkout</button>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="home.html"><span>🏠</span>Home</a>
      <a href="Menu.html"><span>📋</span>Menu</a>
      <a href="Order.html"><span>🍽️</span>Order</a>
      <a href="cart.html" class="active"><span>🛒</span>Cart</a>
      <a href="contact.html"><span>📞</span>Contact</a>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // Load cart from localStorage or initialize empty
    let cart = JSON.parse(localStorage.getItem('freshbite-cart')) || {};

    function renderCart() {
      const cartItems = document.getElementById('cart-items');
      const items = Object.values(cart);

      if (items.length === 0) {
        cartItems.innerHTML = `
          <div class="empty-cart">
            <h3>Your cart is empty</h3>
            <p>Add some delicious items from our menu!</p>
            <a href="Menu.html" class="btn-primary">Browse Menu</a>
          </div>
        `;
        updateTotals();
        return;
      }

      cartItems.innerHTML = items.map(item => `
        <div class="cart-item" data-id="${item.id}">
          <img src="${item.image}" alt="${item.name}" class="cart-item-image">
          <div class="cart-item-details">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">$${item.price.toFixed(2)} each</div>
            <div class="quantity-controls">
              <button class="quantity-btn" onclick="updateQuantity('${item.id}', ${item.qty - 1})">-</button>
              <input type="number" class="quantity-input" value="${item.qty}" min="1" onchange="updateQuantity('${item.id}', this.value)">
              <button class="quantity-btn" onclick="updateQuantity('${item.id}', ${item.qty + 1})">+</button>
            </div>
          </div>
          <button class="remove-btn" onclick="removeItem('${item.id}')">Remove</button>
        </div>
      `).join('');

      updateTotals();
    }

    function updateQuantity(itemId, newQty) {
      newQty = parseInt(newQty);
      if (newQty < 1) {
        removeItem(itemId);
        return;
      }

      if (cart[itemId]) {
        cart[itemId].qty = newQty;
        saveCart();
        renderCart();
        showToast('Quantity updated');
      }
    }

    function removeItem(itemId) {
      delete cart[itemId];
      saveCart();
      renderCart();
      showToast('Item removed from cart');
    }

    function updateTotals() {
      const items = Object.values(cart);
      const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const total = subtotal + 2.50;

      document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('total').textContent = '$' + total.toFixed(2);
      document.getElementById('mobile-total').textContent = '$' + total.toFixed(2);

      // Update cart count
      const totalItems = items.reduce((sum, item) => sum + item.qty, 0);
      document.querySelectorAll('.cart-count').forEach(el => el.textContent = totalItems);

      // Show/hide sticky checkout on mobile
      const stickyCheckout = document.querySelector('.sticky-checkout');
      if (window.innerWidth <= 768 && items.length > 0) {
        stickyCheckout.style.display = 'block';
      } else {
        stickyCheckout.style.display = 'none';
      }
    }

    function saveCart() {
      localStorage.setItem('freshbite-cart', JSON.stringify(cart));
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function checkout() {
      const items = Object.values(cart);
      if (items.length === 0) {
        showToast('Your cart is empty');
        return;
      }

      const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const total = (subtotal + 2.50).toFixed(2);

      let orderText = 'Hi FreshBite, I want to place an order:\n\nItems:\n';
      items.forEach(item => {
        orderText += '• ' + item.name + ' × ' + item.qty + ' = $' + (item.price * item.qty).toFixed(2) + '\n';
      });
      orderText += '\nSubtotal: $' + subtotal.toFixed(2) + '\nDelivery Fee: $2.50\nTotal: $' + total;

      window.open('https://wa.me/1234567890?text=' + encodeURIComponent(orderText), '_blank');
    }

    // Event listeners
    document.getElementById('checkout-btn').addEventListener('click', checkout);
    document.getElementById('mobile-checkout-btn').addEventListener('click', checkout);

    // Initial render
    renderCart();
    updateTotals();
  </script>
  <script src="script.js"></script>
</body>
</html>
